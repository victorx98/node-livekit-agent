# pnpm 11+ reads the build-script allowlist here (no longer from package.json).
# These packages ship platform-native binaries built via postinstall scripts.
onlyBuiltDependencies:
  - esbuild
  - protobufjs
  - sharp
  - "@ffmpeg-installer/linux-x64"
allowBuilds:
  esbuild: true
  protobufjs: true
  sharp: true
  "@ffmpeg-installer/linux-x64": true
  '@google/genai': false
minimumReleaseAgeExclude:
  - '@livekit/agents-plugin-google@1.4.5'
  - '@livekit/agents-plugin-openai@1.4.5'
  - '@livekit/agents@1.4.5'
