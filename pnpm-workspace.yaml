# pnpm 11+ reads the build-script allowlist here (no longer from package.json).
# These packages ship platform-native binaries built via postinstall scripts.
onlyBuiltDependencies:
  - esbuild
  - protobufjs
  - sharp
  - "@ffmpeg-installer/linux-x64"
allowBuilds:
  esbuild: true
  protobufjs: true
  sharp: true
  "@ffmpeg-installer/linux-x64": true
  '@google/genai': false
  '@livekit/local-inference': true
minimumReleaseAgeExclude:
  - '@livekit/agents-plugin-google'
  - '@livekit/agents-plugin-openai'
  - '@livekit/agents'
patchedDependencies:
  '@livekit/agents-plugin-google': patches/@livekit__agents-plugin-google.patch
